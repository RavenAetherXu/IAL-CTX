name: CI

on:
  push:
  pull_request:

jobs:
  ctx-cli:
    name: ctx-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ctx-cli CI
        env:
          CTX_CI_SKIP_RUNTIME_SHA: "1"
        shell: bash
        run: bash packages/ctx-cli/run-ci.sh
